<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result Detail</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="logo">SAGE · Redesign</div>
        <nav class="nav">
          <a href="./results.html">Results</a
          ><a class="active" href="./result-detail.html">Result Detail</a>
        </nav>
      </aside>
      <main class="main">
        <header class="top">
          <div class="title">result-2026-001 · 结论优先</div>
          <div class="top-actions">
            <button class="btn">Back to Results</button
            ><button class="btn primary">Download Bundle</button>
          </div>
        </header>
        <section class="content grid-3">
          <div class="panel">
            <h3>结论</h3>
            <div class="body list">
              <div class="item">
                <strong>总水量</strong>
                <div class="value">1.26e8 m³</div>
              </div>
              <div class="item">
                <strong>高产水区占比</strong>
                <div class="value">34.2%</div>
              </div>
              <div class="item">
                <p class="muted">中游子流域产水贡献最高。</p>
              </div>
            </div>
          </div>
          <div class="panel">
            <h3>地图与指标</h3>
            <div class="body"><div class="map">Result Overlay Map</div></div>
          </div>
          <div class="panel">
            <h3>证据与下载</h3>
            <div class="body list">
              <div class="item">water_yield_2026_001.tif</div>
              <div class="item">sub_basin_stats_2026_001.csv</div>
              <div class="item">result_explanation_2026_001.md</div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
