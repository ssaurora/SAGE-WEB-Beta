<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="logo">SAGE · Redesign</div>
        <nav class="nav">
          <a class="active" href="./results.html">Results</a
          ><a href="./result-detail.html">Result Detail</a>
        </nav>
      </aside>
      <main class="main">
        <header class="top">
          <div class="title">Results · 消费入口</div>
          <div class="top-actions">
            <button class="btn">筛选</button
            ><button class="btn primary">Download Selected</button>
          </div>
        </header>
        <section class="content grid-2">
          <div class="panel">
            <h3>Result List</h3>
            <div class="body">
              <table class="table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Scene</th>
                    <th>Status</th>
                    <th>Format</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>report-2026-001</td>
                    <td>scene-001</td>
                    <td><span class="badge ok">Ready</span></td>
                    <td>PDF</td>
                  </tr>
                  <tr>
                    <td>report-2026-002</td>
                    <td>scene-002</td>
                    <td><span class="badge warn">Processing</span></td>
                    <td>HTML</td>
                  </tr>
                  <tr>
                    <td>report-2026-003</td>
                    <td>scene-003</td>
                    <td><span class="badge err">Failed</span></td>
                    <td>PDF</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="panel">
            <h3>Preview</h3>
            <div class="body list">
              <div class="item">
                <strong>report-2026-001</strong>
                <p class="muted">最近产出，可直接分发。</p>
              </div>
              <div class="item">
                <button class="btn primary">Open Detail</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
